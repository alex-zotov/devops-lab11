apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-psu
  labels:
    app: devops-psu
    release-date: s1773160609
  namespace: devops-psu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-psu
  template:
    metadata:
      labels:
        app: devops-psu
        svc: frontend
        # CI пайплайн будет подставлять новое значение,
        # чтобы ArgoCD «увидел» изменение манифеста
        release-date: s1773160609
    spec:
      containers:
      - name: devops-psu-server
        # путь к репозиторию
        image: alexmzotov/devops-2026:latest
        imagePullPolicy: Always
        ports:
          - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: service-devops
  labels:
    app: devops-psu
  namespace: devops-psu
spec:
  type: LoadBalancer
  selector:
    app: devops-psu
    svc: frontend
  ports:
  - port: 12345
    targetPort: 8000